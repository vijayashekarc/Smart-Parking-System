<div id="player"></div>

<div class="controls">
  <button onclick="playVideo()">Play</button>
  <button onclick="pauseVideo()">Pause</button>
</div>

<script>
  // 3. Load the IFrame Player API code asynchronously
  var tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  var firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  var player;
  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '360',
      width: '640',
      videoId: 'M7lc1UVf-VE', // Replace with your Video ID
      playerVars: {
        'controls': 0,          // Hides all YouTube controls
        'disablekb': 1,        // Disables keyboard controls
        'rel': 0,              // Prevents related videos from other channels
        'modestbranding': 1    // Reduces YouTube logo visibility
      }
    });
  }

  // 4. Functions to control the player
  function playVideo() {
    player.playVideo();
  }

  function pauseVideo() {
    player.pauseVideo();
  }
</script>
